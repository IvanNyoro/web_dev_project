<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrassCraft | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="page-header">
        <div class="container">
            <nav class="navbar">
                <a class="brand" href="index.html">BrassCraft</a>
                <div class="panel">
                    <a href="index.html">Home</a>
                    <a href="products.html">Trumpets</a>
                    <a href="about.html">About</a>
                    <a href="faq.html">FAQ</a>
                    <a href="blog.html">Stories</a>
                </div>
                <div class="interactives">
                    <button type="button" onclick="window.location.href='signup.html'">Sign Up</button>
                    <button type="button" onclick="window.location.href='login.html'">Login</button>
                    <button type="button" onclick="window.location.href='contact.html'">Contact Us</button>
                </div>
            </nav>

            <div class="hero-section">
                <p class="eyebrow">Account Access</p>
                <h1>Welcome back</h1>
                <p>Log in to access your BrassCraft account, view orders, and manage preferences.</p>
            </div>
        </div>
    </header>

    <main class="content">
        <section class="contact-grid container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="contact-card">
                        <h2>Sign in</h2>
                        <form id="loginForm" action="/login" method="post" class="contact-form" novalidate>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
                            </div>
                            <div class="form-group">
                                <label for="password">Password</label>
                                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                            </div>

                            <div class="form-group d-flex align-items-center gap-2">
                                <input type="checkbox" id="showPassword" class="form-check-input" />
                                <label for="showPassword" class="mb-0">Show password</label>
                            </div>

                            <div class="form-group form-check d-flex align-items-center gap-2">
                                <input type="checkbox" id="remember" name="remember" class="form-check-input">
                                <label for="remember" class="form-check-label mb-0">Remember me</label>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn primary">Log in</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

   <footer class="footer">
        <div class="container footer-inner">
            <div>
                <p>BrassCraft Trumpets | Crafted for players who demand precision.</p>
                <p><a href="contact.html">Contact us</a> · <a href="about.html">About</a></p>
            </div>
            <p>&copy; 2026 BrassCraft. All rights reserved.</p>
        </div>
    </footer>
    <script>
        (function () {
            // Find the password input field on the page.
            const pwd = document.getElementById('password');
            // Find the checkbox that lets the user show or hide the password.
            const toggle = document.getElementById('showPassword');
            // Find the login form so we can handle when it is submitted.
            const loginForm = document.getElementById('loginForm');

            // If the password field and checkbox exist, set up the show/hide feature.
            if (toggle && pwd) {
                toggle.addEventListener('change', function () {
                    // When the checkbox changes, switch the password input type.
                    // If the checkbox is checked, show the password in plain text.
                    // If it is not checked, hide the password again.
                    pwd.type = this.checked ? 'text' : 'password';
                });
            }

            // If the login form is not on this page, stop here.
            if (!loginForm) return;

            // Adding submit handler to the login form.
            loginForm.addEventListener('submit', function (event) {
                // Prevent the browser's default submit behavior so we can control validation.
                event.preventDefault();

                // Use the form's validation API to check required fields and other constraints.
                // `checkValidity()` returns false if any required field is empty or invalid.
                if (!loginForm.checkValidity()) {
                    // `reportValidity()` shows the browser's built-in messages and focuses the first invalid field.
                    loginForm.reportValidity();
                    return; // stop here — do not proceed to the success alert
                }

                // If we reach here, the form passed validation — show success message.
                alert('Login successful! Welcome back to BrassCraft.');

                // Clear the form fields after the alert.
                loginForm.reset();
            });
        })();
    </script>
    <script src="../js/main.js"></script>
</body>
</html>
